<!DOCTYPE html>
<html>
<head>
    <title>Iris Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="index-bg">

<div class="card">
    <h2>🌸 Iris Flower Predictor</h2>

    <form action="/predict" method="post">
        <input name="f1" placeholder="Sepal Length" required>
        <input name="f2" placeholder="Sepal Width" required>
        <input name="f3" placeholder="Petal Length" required>
        <input name="f4" placeholder="Petal Width" required>
        <button type="submit">Predict</button>
    </form>
</div>

</body>
</html>
